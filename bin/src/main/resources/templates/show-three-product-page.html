<html xmlns:th="http://www.thymeleaf.org">
	
	<body>
		<h1>Produkti no JAVA!</h1>
		
		<p th:each="prod : ${package}">
			<p th:text="${prod.getId}"></p>
			<p th:text="${prod.getTitle}"></p>
			<p th:text="${prod.getDescription}"></p>
			<p th:text="${prod.getPrice}"></p>
			<p th:text="${prod.getQuantity}"></p>
			<p th:text="${prod.getProductType}"></p>
		</p>
	</body>
</html>
